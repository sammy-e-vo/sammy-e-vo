  <text x="40" y="76" font-size="11" font-family="Arial, sans-serif" font-weight="bold" fill="#be185d" letter-spacing="2">ABOUT ME</text>
  <line x1="122" y1="70" x2="760" y2="70" stroke="#fcd34d" stroke-width="1.5"/>

