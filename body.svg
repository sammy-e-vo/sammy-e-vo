  <rect x="40" y="340" width="5" height="90" rx="2" fill="#e879a0"/>
  <text x="400" y="385" font-size="16" text-anchor="middle" font-family="Georgia, serif" font-style="italic" fill="#7c3aed">"long story short, i was in my coding era."</text>
  <text x="400" y="412" font-size="10" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" fill="#e879a0" letter-spacing="2">⭐ SAMMY&#39;S VERSION ⭐</text>

  <!-- footer wave -->
  <ellipse cx="400" cy="575" rx="520" ry="55" fill="#ede9fe"/>
  <ellipse cx="400" cy="588" rx="520" ry="55" fill="#fde8f5"/>
