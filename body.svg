  <text x="160" y="32" font-size="14" text-anchor="middle" fill="#c4b5fd" font-family="serif">✦<animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></text>
  <text x="240" y="38" font-size="20" text-anchor="middle" font-family="serif">🌟<animate attributeName="opacity" values="0.5;1;0.5" dur="1.9s" repeatCount="indefinite"/></text>
  <text x="320" y="32" font-size="14" text-anchor="middle" fill="#f0abcf" font-family="serif">✧<animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/></text>
  <text x="400" y="38" font-size="20" text-anchor="middle" font-family="serif">⭐<animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/></text>
  <text x="480" y="32" font-size="14" text-anchor="middle" fill="#c4b5fd" font-family="serif">✦<animate attributeName="opacity" values="1;0.3;1" dur="3.0s" repeatCount="indefinite"/></text>
  <text x="560" y="38" font-size="20" text-anchor="middle" font-family="serif">🌟<animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/></text>
  <text x="640" y="32" font-size="14" text-anchor="middle" fill="#f0abcf" font-family="serif">✧<animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/></text>
  <text x="720" y="38" font-size="20" text-anchor="middle" font-family="serif">⭐<animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/></text>

